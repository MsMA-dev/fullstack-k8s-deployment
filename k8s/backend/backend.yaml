apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fullstack
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: "msmadev/fullstack-backend:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: fullstack
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8088
      targetPort: 8080

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: fullstack
type: Opaque
stringData:
  DB_USER: admin
  DB_PASSWORD: Done123
